# Default dev (plan1): Milvus Lite + local rank-bm25 — no containers required.
# Legacy stack (remote Milvus + Elasticsearch): docker compose --profile legacy up -d
# API only in Docker (uses Lite inside container): docker compose --profile app up -d

version: "3.8"
services:
  milvus:
    profiles: ["legacy"]
    image: milvusdb/milvus:v2.4.7
    ports:
      - "19530:19530"
      - "9091:9091"
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    depends_on:
      - etcd
      - minio
    volumes:
      - milvus_data:/var/lib/milvus

  elasticsearch:
    profiles: ["legacy"]
    image: elasticsearch:8.15.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  etcd:
    profiles: ["legacy"]
    image: quay.io/coreos/etcd:v3.5.5
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379
    ports:
      - "2379:2379"

  minio:
    profiles: ["legacy"]
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  redis:
    profiles: ["cache"]
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rag-api:
    profiles: ["app"]
    build: .
    image: xiaoxin-rag-api:local
    ports:
      - "8000:8000"
    environment:
      USE_MILVUS_LITE: "true"
      # 生产建议设置（也可写在 .env）：
      # RAG_API_SECRET: 网关密钥；CORS_ALLOW_ORIGINS: 逗号分隔前端来源；DISABLE_OPENAPI_DOCS: "true"
      # TRUSTED_HOSTS: 反 Host 伪造，如 api.example.com,localhost
    env_file:
      - .env
    volumes:
      - rag_app_data:/app/enterprise_rag/data

volumes:
  milvus_data:
  es_data:
  minio_data:
  rag_app_data:
